<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Talib al-ʿIlm</title>
<meta name="description" content="An interactive roadmap of the classical Islamic sciences.">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" href="https://i.imgur.com/STz3I9W.png">
<link rel="apple-touch-icon" href="https://i.imgur.com/STz3I9W.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   TALIB AL-ʿILM — OLED HUB / PRESENTATION
   Horizontal slide deck · no traditional scrolling.
   Navigation: wheel / trackpad swipe / touch swipe / keys / dots.
════════════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gold:#D4AF37;
  --gold-soft:#e8c97a;
  --ink:#ededf0;
  --dim:#6a6a72;
  --faint:#262629;
  --ease:cubic-bezier(.22,1,.36,1);
  --hanbali:#81c784;
  --shafi:#64b5f6;
  --maliki:#ce93d8;
  --hanafi:#ff8a65;
}

html,body{height:100%}
body{
  background:#000;
  color:var(--ink);
  font-family:'IBM Plex Mono',monospace;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ── BACK STACK — flat black 2D plane with faint colour depth ── */
body::before{
  content:'';position:fixed;inset:-10%;z-index:0;pointer-events:none;
  background:
    radial-gradient(38% 48% at 17% 20%, rgba(212,175,55,.11), transparent 70%),
    radial-gradient(36% 44% at 84% 28%, rgba(100,181,246,.07), transparent 70%),
    radial-gradient(42% 50% at 74% 84%, rgba(129,199,132,.07), transparent 70%),
    radial-gradient(40% 46% at 24% 82%, rgba(206,147,216,.06), transparent 70%),
    #000;
}

/* ── DECK + SLIDES ─────────────────────────────────────────── */
#deck{display:flex;width:100%;height:100dvh;position:relative;z-index:1;
  transition:transform .95s cubic-bezier(.16,1,.3,1);will-change:transform;
  backface-visibility:hidden}
.slide{
  flex:0 0 100%;width:100vw;height:100dvh;position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:max(28px,env(safe-area-inset-top)) clamp(24px,6vw,72px) max(28px,env(safe-area-inset-bottom));
  overflow:hidden;
}
.inner{
  width:100%;max-width:600px;margin:0 auto;position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:clamp(34px,5vw,58px) clamp(26px,5vw,50px);
  border-radius:clamp(22px,4vw,32px);
  background:linear-gradient(150deg,rgba(255,255,255,.09),rgba(255,255,255,.022));
  border:1px solid rgba(255,255,255,.14);
  box-shadow:0 30px 80px -22px rgba(0,0,0,.72),
    inset 0 1px 0 rgba(255,255,255,.2),
    inset 0 -1px 0 rgba(0,0,0,.25);
  transition:transform .95s cubic-bezier(.16,1,.3,1),opacity .8s ease,box-shadow .9s ease;
}
/* Glass blur only on the active card — one backdrop-filter at a time (perf) */
.slide:not(.active) .inner{transform:scale(.9) translateY(22px);opacity:.3;
  box-shadow:0 20px 50px -28px rgba(0,0,0,.7)}
.slide.active .inner{transform:none;opacity:1;
  backdrop-filter:blur(22px) saturate(1.5);
  -webkit-backdrop-filter:blur(22px) saturate(1.5)}
.slide::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 55% 50% at 50% 48%,rgba(212,175,55,.05) 0%,transparent 70%);
  opacity:0;transition:opacity 1s ease;
}
.slide.active::after{opacity:1}

/* Content entrance */
.anim-in{opacity:0;transform:translateY(20px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.slide.active .anim-in{opacity:1;transform:none}
.slide.active .anim-in.d1{transition-delay:.10s}
.slide.active .anim-in.d2{transition-delay:.22s}
.slide.active .anim-in.d3{transition-delay:.34s}
.slide.active .anim-in.d4{transition-delay:.46s}

/* ════════════════════════════════════════════════════════════
   ORGANIC TREE BRANCH — grows from a slide corner, ends in a flower.
════════════════════════════════════════════════════════════ */
.branch{
  position:absolute;width:clamp(150px,32vw,300px);height:clamp(150px,32vw,300px);
  z-index:1;pointer-events:none;overflow:visible;
}
.branch.tl{top:0;left:0;transform:scaleY(-1)}
.branch.tr{top:0;right:0;transform:scale(-1,-1)}
.branch.bl{bottom:0;left:0}
.branch.br{bottom:0;right:0;transform:scaleX(-1)}

.branch .stem{
  fill:none;stroke:var(--flower);stroke-width:1.6;stroke-linecap:round;
  opacity:.55;pathLength:1;stroke-dasharray:1;stroke-dashoffset:1;
}
.branch .leaf{fill:var(--flower);opacity:0}
.branch .petal{fill:var(--flower)}
.branch .petal-core{fill:#fff;opacity:.85}
.branch .flower{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.2);
  filter:drop-shadow(0 0 6px var(--flower))}

.slide.active .branch .stem{animation:stemGrow 1.5s var(--ease) forwards}
.slide.active .branch .leaf{animation:leafIn .6s var(--ease) forwards}
.slide.active .branch .leaf.l2{animation-delay:.7s}
.slide.active .branch .leaf.l1{animation-delay:.5s}
.slide.active .branch .flower{animation:bloom .9s var(--ease) 1.05s forwards}
@keyframes stemGrow{to{stroke-dashoffset:0}}
@keyframes leafIn{to{opacity:.7}}
@keyframes bloom{to{opacity:1;transform:scale(1)}}

/* ── INTRO ─────────────────────────────────────────────────── */
.emblem{
  position:relative;width:clamp(140px,28vw,200px);height:clamp(140px,28vw,200px);
  margin:0 auto clamp(28px,4.5vw,44px) auto;display:flex;align-items:center;justify-content:center;
}
.profile-container{
  width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative;z-index:2;
}
.profile-container img{
  width:100%;height:100%;object-fit:cover;object-position:center 50%;
  transform:scale(1.18);transform-origin:center center;
}
.profile-container::after{
  content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3;
  background:
    radial-gradient(circle at 33% 30%, rgba(255,255,255,.07) 0%, transparent 46%),
    radial-gradient(circle at 80% 64%, rgba(0,0,0,.55) 0%, rgba(0,0,0,.22) 34%, transparent 62%);
  box-shadow:
    inset -16px -14px 38px rgba(0,0,0,.55),
    inset 14px 12px 34px rgba(212,175,55,.05);
}
.glow-aura{
  position:absolute;width:124%;height:124%;border-radius:50%;
  background:radial-gradient(circle,
    rgba(212,175,55,0.20) 0%,
    rgba(212,175,55,0.10) 34%,
    rgba(212,175,55,0.03) 58%,
    transparent 74%);
  animation:breathe 6s ease-in-out infinite alternate;
  z-index:1;pointer-events:none;
}
.orbit-ring{position:absolute;border-radius:50%;z-index:1;pointer-events:none;will-change:transform}
.orbit-outer{width:138%;height:138%;border:0.75px dashed rgba(212,175,55,0.16);
  animation:rotateClockwise 35s linear infinite}
.orbit-inner{width:118%;height:118%;border:1px dotted rgba(212,175,55,0.08);
  animation:rotateCounterClockwise 28s linear infinite}
.dust{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;
  opacity:0;z-index:1;pointer-events:none;will-change:transform,opacity;
  box-shadow:0 0 4px 1px rgba(212,175,55,.7)}
.dust-1{left:22%;top:80%;animation:floatDust 7s infinite ease-in-out}
.dust-2{left:78%;top:70%;animation:floatDust 9s infinite ease-in-out 1.8s}
.dust-3{left:45%;top:90%;animation:floatDust 8s infinite ease-in-out 3.2s}
.dust-4{left:62%;top:85%;animation:floatDust 6s infinite ease-in-out 4.6s}
@keyframes breathe{0%{transform:scale(0.92);opacity:0.4}100%{transform:scale(1.08);opacity:0.8}}
@keyframes rotateClockwise{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes rotateCounterClockwise{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
@keyframes floatDust{0%{transform:translateY(0) scale(0.5);opacity:0}30%{opacity:0.7}70%{opacity:0.3}100%{transform:translateY(-70px) scale(1.2);opacity:0}}
.slide:not(.active) .glow-aura,
.slide:not(.active) .orbit-ring,
.slide:not(.active) .dust{animation-play-state:paused;will-change:auto}

.intro-title{font-family:'Cinzel',serif;font-weight:500;
  font-size:clamp(28px,6vw,50px);letter-spacing:.1em;line-height:1.1;margin-bottom:14px}
.intro-sub{font-size:clamp(10px,2vw,12px);letter-spacing:.26em;text-transform:uppercase;
  color:var(--dim);line-height:1.6}
.intro-insha{font-family:'Noto Naskh Arabic',serif;
  font-size:clamp(26px,6vw,46px);line-height:1.4;color:var(--gold);
  margin-top:clamp(20px,4vw,30px);text-shadow:0 0 30px rgba(212,175,55,.3);direction:rtl}

/* ── FEATURE SLIDES ────────────────────────────────────────── */
.f-tag{display:inline-block;font-size:8.5px;letter-spacing:.24em;text-transform:uppercase;
  border:1px solid;border-radius:30px;padding:4px 12px;margin-bottom:18px;font-weight:500}
.f-title{font-family:'Cinzel',serif;font-weight:500;
  font-size:clamp(24px,5vw,42px);letter-spacing:.03em;line-height:1.25;
  margin-bottom:clamp(18px,3.5vw,28px)}
.f-text{font-size:clamp(13px,2.4vw,16.5px);line-height:1.85;font-weight:300;
  color:var(--ink);max-width:540px}
.intro-title,.final-title,.f-title{outline:none}
.intro-title:focus,.final-title:focus,.f-title:focus,
.intro-title:focus-visible,.final-title:focus-visible,.f-title:focus-visible{outline:none}

/* companion / resource link buttons */
.f-links{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:clamp(24px,4.5vw,34px)}
.f-link{display:inline-flex;align-items:center;gap:9px;text-decoration:none;
  font-size:clamp(11px,2.1vw,13px);letter-spacing:.08em;color:var(--ink);
  border:1px solid var(--faint);border-radius:40px;padding:11px 20px;
  transition:border-color .22s ease,color .22s ease,transform .22s ease,box-shadow .22s ease}
.f-link:hover{border-color:var(--gold);color:var(--gold-soft);transform:translateY(-2px);
  box-shadow:0 8px 24px -10px rgba(212,175,55,.5)}
.f-link .fl-ic{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* Typewriter */
.tw .word{white-space:nowrap;display:inline}
.tw .c{opacity:0;transition:opacity .05s linear}
.tw .c.on{opacity:1}
.tw .ar{font-family:'Noto Naskh Arabic',serif;font-size:1.15em;direction:rtl;unicode-bidi:isolate}
.tw .c.cursor{position:relative}
.tw .c.cursor::after{content:'';position:absolute;right:-3px;top:8%;height:84%;width:2px;
  background:var(--gold);border-radius:1px;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

.gold{background:linear-gradient(135deg,#f6e27a 0%,#D4AF37 48%,#a9831f 100%);
  background-size:100% 100%;background-position:0 0;
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;font-weight:500}
.gold.sweep{background-size:220% 100%;animation:goldSweep 1.15s ease forwards}
@keyframes goldSweep{0%{background-position:210% 0}100%{background-position:0 0}}

/* ── FINAL — Press to Enter ────────────────────────────────── */
.seal{font-family:'Noto Naskh Arabic',serif;font-size:clamp(32px,6vw,44px);
  color:var(--gold);margin-bottom:22px;letter-spacing:.02em;direction:rtl}
.final-title{font-family:'Cinzel',serif;font-weight:500;
  font-size:clamp(26px,5vw,40px);letter-spacing:.05em;margin-bottom:14px}
.final-title .insha-w{font-family:'Noto Naskh Arabic',serif;color:#fff;font-weight:400;
  font-size:.7em;direction:rtl;unicode-bidi:isolate;margin-inline-start:.4em;
  vertical-align:middle;text-shadow:0 0 18px rgba(255,255,255,.28)}
.final-sub{font-size:clamp(12px,2.2vw,15px);color:var(--dim);line-height:1.9;
  max-width:440px;margin-bottom:clamp(34px,6vw,52px);font-weight:300}
.final-sub .ar{font-family:'Noto Naskh Arabic',serif;color:var(--gold-soft);
  font-size:1.45em;letter-spacing:0;direction:rtl;display:inline-block;margin-top:4px}
.final-flower{font-size:clamp(46px,10vw,76px);line-height:1;color:var(--gold);
  margin-bottom:clamp(34px,6vw,52px);text-shadow:0 0 26px rgba(212,175,55,.5)}
/* ── Motivation video slide ── */
.inner-wide{max-width:min(840px,94vw)}
.v-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:clamp(9px,1.8vw,11px);
  letter-spacing:.3em;text-transform:uppercase;color:var(--gold-soft);
  margin-bottom:clamp(16px,3vw,24px);display:flex;align-items:center;gap:12px;outline:none}
.v-eyebrow::before,.v-eyebrow::after{content:'';height:1px;width:clamp(18px,5vw,48px);
  background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.video-frame{position:relative;width:100%;border-radius:clamp(15px,2.6vw,22px);
  padding:clamp(6px,1.2vw,10px);
  background:linear-gradient(150deg,rgba(212,175,55,.24),rgba(212,175,55,.05));
  border:1px solid rgba(212,175,55,.34);
  box-shadow:0 26px 70px -24px rgba(0,0,0,.82),0 0 44px -12px rgba(212,175,55,.28),
    inset 0 1px 0 rgba(255,255,255,.16)}
.video-aspect{position:relative;width:100%;aspect-ratio:16/9;
  border-radius:clamp(9px,1.9vw,14px);overflow:hidden;background:#000}
.video-aspect .yt{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
.video-facade{position:absolute;inset:0;width:100%;height:100%;border:0;cursor:pointer;padding:0;
  background:#0a0a0a center/cover no-repeat;display:flex;align-items:center;justify-content:center}
.video-facade::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.12),rgba(0,0,0,.55))}
.yt-play{position:relative;z-index:1;width:clamp(54px,9vw,76px);height:clamp(54px,9vw,76px);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,rgba(243,217,140,.96),rgba(169,131,31,.96));
  box-shadow:0 8px 28px -6px rgba(0,0,0,.7),0 0 30px -6px rgba(212,175,55,.6);
  transition:transform .25s var(--ease),box-shadow .25s ease}
.video-facade:hover .yt-play,.video-facade:focus-visible .yt-play{transform:scale(1.1);
  box-shadow:0 10px 36px -6px rgba(0,0,0,.7),0 0 46px -4px rgba(212,175,55,.85)}
.yt-play svg{width:42%;height:42%;margin-left:8%;fill:#0c0904}

.enter-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.enter-btn{display:flex;align-items:center;background:transparent;border:0;outline:0;
  cursor:pointer;color:var(--gold-soft);
  font-family:'Cinzel',serif;font-weight:600;
  font-size:clamp(14px,2.8vw,18px);letter-spacing:.18em;text-transform:uppercase;
  line-height:1.5;padding:1rem .25rem;-webkit-tap-highlight-color:transparent;
  transition:color .3s ease}
.enter-btn::before{content:"";display:inline-block;height:1.5px;width:0;margin-right:10px;
  background:var(--gold);border-radius:2px;box-shadow:0 0 10px rgba(212,175,55,.7);
  transition:all .42s cubic-bezier(.25,.8,.25,1)}
.enter-btn:hover{color:#fff}
.enter-btn:hover::before,.enter-btn:focus-visible::before{width:3rem}
.enter-btn:active{transform:translateY(1px)}
.enter-btn:focus-visible{outline:none}
.enter-hint{font-size:clamp(9px,1.7vw,11px);letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}

/* ── NAVIGATION UI ─────────────────────────────────────────── */
#dots{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:50%;
  transform:translateX(-50%);display:flex;gap:11px;z-index:50}
#dots .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);cursor:pointer;
  border:none;padding:0;transition:all .4s var(--ease)}
#dots .dot.active{background:var(--gold);box-shadow:0 0 10px rgba(212,175,55,.6);transform:scale(1.25)}

#nav-hint{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));right:clamp(20px,4vw,38px);
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);z-index:50;
  display:flex;align-items:center;gap:9px;opacity:0;transition:opacity .5s ease}
#nav-hint.show{opacity:1}
#nav-hint .arrow{animation:nudge 1.8s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(5px)}}

@media (prefers-reduced-motion: reduce){
  .glow-aura,.orbit-ring,.dust{display:none}
  body::before{animation:none}
  .inner,.slide:not(.active) .inner{transition:none;transform:none;opacity:1;filter:none}
  #deck{transition-duration:.3s}
  .tw .c{transition:none}
  .gold.sweep{animation:none}
  .branch .stem{stroke-dashoffset:0}
  .branch .flower{opacity:1;transform:scale(1)}
  .branch .leaf{opacity:.7}
}
</style>
</head>
<body>

<!-- Set data-app-url to your live roadmap (tree) URL so "Enter" navigates there -->
<div id="deck" aria-live="polite" data-app-url=""></div>

<div id="dots"></div>
<div id="nav-hint"><span>Swipe</span><span class="arrow">&#8594;</span></div>

<script>
"use strict";
(function(){
  /* ── Config ── */
  const CONFIG = {
    TYPE_SPEED:24, FIRST_DELAY:140, NEXT_DELAY:60, WHEEL_COOLDOWN:950, APP_URL:''
  };
  const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const AR = /[\u0600-\u06FF]/;

  /* Reusable organic branch */
  const BRANCH = `<svg class="branch __CORNER__" viewBox="0 0 300 300" style="--flower:__COLOR__" aria-hidden="true">
      <path class="stem" d="M8,292 C46,250 64,214 96,184 C128,154 152,126 182,86"/>
      <path class="stem" d="M96,184 C104,160 124,150 150,150"/>
      <path class="stem" d="M150,150 C156,128 150,108 162,92"/>
      <ellipse class="leaf l1" cx="150" cy="150" rx="13" ry="6" transform="rotate(18 150 150)"/>
      <ellipse class="leaf l2" cx="162" cy="92" rx="11" ry="5" transform="rotate(-28 162 92)"/>
      <g transform="translate(182,84)">
        <g class="flower">
          <ellipse class="petal" cx="0" cy="-11" rx="6.5" ry="12"/>
          <ellipse class="petal" cx="10.5" cy="-3.4" rx="6.5" ry="12" transform="rotate(72)"/>
          <ellipse class="petal" cx="6.5" cy="8.9" rx="6.5" ry="12" transform="rotate(144)"/>
          <ellipse class="petal" cx="-6.5" cy="8.9" rx="6.5" ry="12" transform="rotate(216)"/>
          <ellipse class="petal" cx="-10.5" cy="-3.4" rx="6.5" ry="12" transform="rotate(288)"/>
          <circle class="petal-core" cx="0" cy="0" r="4.5"/>
        </g>
      </g>
    </svg>`;
  function branch(corner,color){ return BRANCH.replace('__CORNER__',corner).replace('__COLOR__',color); }

  const NOTE_ICON='<svg class="fl-ic" viewBox="0 0 24 24"><path d="M14 4l6 6M4 20l1-5L16 4l4 4L9 19l-5 1z"/></svg>';
  const CAL_ICON ='<svg class="fl-ic" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg>';

  /* ── Slide data ── */
  const SLIDES = [
    { type:'intro',  corner:'tl', flower:'#D4AF37' },

    { type:'feature', corner:'tr', flower:'#64b5f6', title:'The Knowledge Tree',
      text:'A structured roadmap of {{six levels}}, from your first steps to mastery. Each level branches into its sciences and the texts studied within them.' },

    { type:'feature', corner:'bl', flower:'#69f0ae', title:"Qur'an Memorization",
      text:'The {{thirty juz}} are distributed across the levels and tracked individually as each is committed to memory, {{ar:إن شاء الله}}.' },

    { type:'feature', corner:'br', flower:'#ce93d8', title:'Four Schools of Fiqh',
      text:"The roadmap supports the {{Hanbali|#81c784}}, {{Shafi'i|#64b5f6}}, {{Maliki|#ce93d8}}, and {{Hanafi|#ff8a65}} schools — choosing one filters the fiqh texts to it, while every shared science stays visible." },

    { type:'feature', corner:'tl', flower:'#f0b357', title:'Specializations',
      text:'Choose one or more {{takhaṣṣuṣ}} tracks — ʿaqīdah, ḥadīth, fiqh, tafsīr, sīrah, or Arabic. Each adds its advanced texts to your {{memorization plan}}; the core remains for everyone.' },

    { type:'feature', corner:'tr', flower:'#e06b9c', title:'Spaced Repetition',
      text:'Texts marked for memorization enter a {{review schedule}} at widening intervals — and when they fall due, a quiet badge calls you back to revise.' },

    { type:'feature', corner:'bl', flower:'#7fd1ae', title:'Ḥifẓ Mode',
      text:'A dedicated {{ḥifẓ view}} gathers every text you are memorizing — showing what is secured and what is {{due for review today}}, all in one focused screen.' },

    { type:'feature', corner:'tl', flower:'#22b8d6', title:'Progress Tracking',
      text:'Mark each text {{started or finished}}. Your progress is recorded per text, per level, and across the whole journey.' },

    { type:'feature', corner:'tr', flower:'#6fb0d6', title:'Resources & Companions',
      text:'Every text links to its {{book, PDF, and recorded explanation}}. Two companion apps complete the suite:',
      links:[
        { label:'Notes',   url:'https://talibalilm.github.io/NOTES/',   icon:NOTE_ICON },
        { label:'Planner', url:'https://talibalilm.github.io/PLANNER/', icon:CAL_ICON }
      ] },

    { type:'video',  corner:'bl', flower:'#D4AF37',
      eyebrow:'Before You Begin', vid:'N0drwM9yhTs' },

    { type:'final',  corner:'br', flower:'#D4AF37' }
  ];

  const deck = document.getElementById('deck');
  CONFIG.APP_URL = deck.getAttribute('data-app-url') || CONFIG.APP_URL;

  /* ── Build slides ── */
  function buildSlides(){
    return SLIDES.map(s=>{
      const br = (s.type==='intro' || s.type==='final') ? '' : branch(s.corner, s.flower);
      if(s.type==='intro'){
        return `<section class="slide" data-type="intro">
          <div class="inner">
            <div class="emblem anim-in">
              <div class="glow-aura"></div>
              <div class="orbit-ring orbit-outer"></div>
              <div class="orbit-ring orbit-inner"></div>
              <div class="dust dust-1"></div><div class="dust dust-2"></div>
              <div class="dust dust-3"></div><div class="dust dust-4"></div>
              <div class="profile-container"><img src="https://i.imgur.com/STz3I9W.png" alt="Talib al-Ilm" decoding="async" width="200" height="200"></div>
            </div>
            <h1 class="intro-title anim-in d1" tabindex="-1">Talib al-&#x02BF;Ilm</h1>
            <div class="intro-sub anim-in d2">An interactive roadmap of the Islamic sciences</div>
            <div class="intro-insha anim-in d3">&#1573;&#1606; &#1588;&#1575;&#1569; &#1575;&#1604;&#1604;&#1607;</div>
          </div>
        </section>`;
      }
      if(s.type==='final'){
        return `<section class="slide" data-type="final">${br}
          <div class="inner">
            <div class="seal anim-in">&#1575;&#1604;&#1581;&#1605;&#1583; &#1604;&#1604;&#1607;</div>
            <h2 class="final-title anim-in d1" tabindex="-1">Begin <span class="insha-w">&#1573;&#1606; &#1588;&#1575;&#1569; &#1575;&#1604;&#1604;&#1607;</span></h2>
            <div class="final-flower anim-in d2" aria-hidden="true">&#10048;</div>
            <div class="enter-wrap anim-in d3">
              <button class="enter-btn" id="enterBtn">Join the Journey</button>
            </div>
          </div>
        </section>`;
      }
      if(s.type==='video'){
        return `<section class="slide" data-type="video">${br}
          <div class="inner inner-wide">
            <div class="v-eyebrow anim-in" tabindex="-1">${s.eyebrow}</div>
            <div class="video-frame anim-in d1">
              <div class="video-aspect">
                <button class="video-facade" data-vid="${s.vid}" aria-label="Play motivation video" style="background-image:url('https://i.ytimg.com/vi/${s.vid}/maxresdefault.jpg')">
                  <span class="yt-play"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></span>
                </button>
              </div>
            </div>
          </div>
        </section>`;
      }
      // feature
      const tag = s.tag ? `<span class="f-tag anim-in" style="color:${s.flower};border-color:${s.flower}66">${s.tag}</span>` : '';
      const titleCls = 'f-title anim-in' + (s.tag ? ' d1' : '');
      const links = s.links ? `<div class="f-links anim-in d3">${
        s.links.map(l=>`<a class="f-link" href="${l.url}" target="_blank" rel="noopener">${l.icon||''}<span>${l.label}</span></a>`).join('')
      }</div>` : '';
      return `<section class="slide" data-type="feature">${br}
        <div class="inner">
          ${tag}
          <h2 class="${titleCls}" tabindex="-1">${s.title}</h2>
          <p class="f-text tw" data-tw="${escapeAttr(s.text)}"></p>
          ${links}
        </div>
      </section>`;
    }).join('');
  }
  function escapeAttr(str){ return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

  deck.innerHTML = buildSlides();
  const slides = Array.from(deck.querySelectorAll('.slide'));
  const total  = slides.length;
  let index = 0;
  const typed = new Set();

  /* ── Dots ── */
  const dotsEl = document.getElementById('dots');
  slides.forEach((_,i)=>{
    const d=document.createElement('button');
    d.className='dot'+(i===0?' active':'');
    d.setAttribute('aria-label','Go to slide '+(i+1));
    d.addEventListener('click',()=>go(i,true));
    dotsEl.appendChild(d);
  });
  const dots = Array.from(dotsEl.children);
  const navHint = document.getElementById('nav-hint');

  /* ── Navigation ── */
  function go(n, userInitiated){
    n=Math.max(0,Math.min(total-1,n));
    if(n===index && userInitiated!=='init') return;
    index=n;
    deck.style.transform=`translateX(${-100*index}vw) translateZ(0)`;
    update(userInitiated);
  }
  const next=()=>go(index+1,true);
  const prev=()=>go(index-1,true);

  /* ── Motivation video: load the real player only on click (perf + reliable autoplay) ── */
  document.getElementById('deck').addEventListener('click',(e)=>{
    const f=e.target.closest('.video-facade'); if(!f) return;
    const wrap=f.closest('.video-aspect'); if(!wrap) return;
    const u='https://www.youtube.com/embed/'+f.dataset.vid+'?rel=0&playsinline=1&modestbranding=1&autoplay=1';
    wrap.innerHTML='<iframe class="yt" data-src="'+u+'" src="'+u+'" title="Motivation" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>';
  });

  function update(userInitiated){
    slides.forEach((s,i)=>{
      const on=(i===index);
      s.classList.toggle('active',on);
      s.setAttribute('aria-hidden',on?'false':'true');
      if('inert' in HTMLElement.prototype){ s.inert=!on; }
    });
    dots.forEach((d,i)=>d.classList.toggle('active',i===index));
    navHint.classList.toggle('show',index===0);
    // Video: load+autoplay only on its active slide; clear src elsewhere to stop sound
    slides.forEach((s,i)=>{
      const yt=s.querySelector('.yt'); if(!yt) return;
      if(i===index){ if(!yt.getAttribute('src')) yt.setAttribute('src',yt.dataset.src); }
      else if(yt.getAttribute('src')){ yt.removeAttribute('src'); }
    });
    if(!typed.has(index)) typeSlide(slides[index]);
    if(userInitiated===true){
      const h=slides[index].querySelector('[tabindex="-1"]');
      if(h) h.focus({preventScroll:true});
    }
  }

  /* ── Typewriter ── */
  function typeSlide(slide){
    typed.add(slides.indexOf(slide));
    const targets=slide.querySelectorAll('[data-tw]');
    if(!targets.length) return;
    let chain=Promise.resolve();
    targets.forEach((el,i)=>{ chain=chain.then(()=>typeInto(el, i===0?CONFIG.FIRST_DELAY:CONFIG.NEXT_DELAY)); });
  }

  function typeInto(el, startDelay){
    return new Promise(resolve=>{
      const tokens=parseTokens(el.getAttribute('data-tw'));
      el.innerHTML='';
      const letters=[];
      const styledEls=[];
      let word=null;
      const flush=()=>{ if(word){ el.appendChild(word); word=null; } };

      tokens.forEach(t=>{
        if(t.arabic || AR.test(t.text)){
          flush();
          const s=document.createElement('span');
          s.className='c ar';
          const col = t.color || (t.gold ? 'var(--gold)' : '');
          if(col){ s.style.color=col; s.style.webkitTextFillColor=col; }
          s.textContent=t.text;
          const w=document.createElement('span'); w.className='word'; w.appendChild(s);
          el.appendChild(w);
          letters.push(s);
          return;
        }
        for(const ch of t.text){
          if(ch===' '){ flush(); el.appendChild(document.createTextNode(' ')); continue; }
          if(!word){ word=document.createElement('span'); word.className='word'; }
          const s=document.createElement('span');
          s.className='c'+(t.gold?' gold':'');
          if(t.color){ s.style.color=t.color; s.style.webkitTextFillColor=t.color; }
          s.textContent=ch;
          word.appendChild(s);
          letters.push(s);
          if(t.gold) styledEls.push(s);
        }
      });
      flush();

      const finish=()=>{ if(!REDUCED) styledEls.forEach(g=>g.classList.add('sweep')); resolve(); };
      if(REDUCED){ letters.forEach(s=>s.classList.add('on')); finish(); return; }

      let i=0, prevCursor=null;
      function step(){
        if(prevCursor){ prevCursor.classList.remove('cursor'); prevCursor=null; }
        if(i>=letters.length){ finish(); return; }
        const s=letters[i++];
        s.classList.add('on');
        if(!s.classList.contains('ar')){ s.classList.add('cursor'); prevCursor=s; }
        setTimeout(step, CONFIG.TYPE_SPEED);
      }
      setTimeout(step, startDelay);
    });
  }

  function parseTokens(str){
    const out=[],re=/\{\{(.+?)\}\}/g;let last=0,m;
    while((m=re.exec(str))){
      if(m.index>last) out.push({text:str.slice(last,m.index),gold:false,color:null,arabic:false});
      let inner=m[1], color=null, gold=true, arabic=false;
      if(inner.indexOf('ar:')===0){ arabic=true; gold=true; inner=inner.slice(3); }
      const pipe=inner.lastIndexOf('|');
      if(pipe>-1){ color=inner.slice(pipe+1); inner=inner.slice(0,pipe); gold=false; }
      out.push({text:inner,gold:gold,color:color,arabic:arabic});
      last=m.index+m[0].length;
    }
    if(last<str.length) out.push({text:str.slice(last),gold:false,color:null,arabic:false});
    return out;
  }

  /* ── Wheel / trackpad ── */
  let wheelLock=false;
  window.addEventListener('wheel',(e)=>{
    const delta=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;
    if(Math.abs(delta)<12||wheelLock) return;
    wheelLock=true; setTimeout(()=>wheelLock=false,CONFIG.WHEEL_COOLDOWN);
    delta>0?next():prev();
  },{passive:true});

  /* ── Touch swipe ── */
  let tx=null,ty=null;
  window.addEventListener('touchstart',(e)=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchend',(e)=>{
    if(tx===null) return;
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)) (dx<0?next():prev());
    tx=ty=null;
  },{passive:true});

  /* ── Keyboard ── */
  window.addEventListener('keydown',(e)=>{
    if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();next();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
    else if(e.key==='Home') go(0,true);
    else if(e.key==='End') go(total-1,true);
  });

  window.addEventListener('resize',()=>{ deck.style.transform=`translateX(${-100*index}vw) translateZ(0)`; });

  go(0,'init');

  /* ── Press-to-enter ── */
  const enterBtn=document.getElementById('enterBtn');
  if(enterBtn){
    enterBtn.addEventListener('click',()=>{
      if(CONFIG.APP_URL){ window.location.href=CONFIG.APP_URL; return; }
      // No URL configured yet — gentle acknowledgement
      if(enterBtn.animate){
        enterBtn.animate([{transform:'scale(1)'},{transform:'scale(.96)'},{transform:'scale(1)'}],{duration:260,easing:'ease'});
      }
    });
  }
})();
</script>
</body>
</html>
